import pandas as pd
import gspread
from gspread_dataframe import set_with_dataframe
from google.oauth2.service_account import Credentials
import json
import os

print("Starting NFL standings update...")

# ── Authentication (replaces Colab auth) ──────────────────────────────────────
creds_json = json.loads(os.environ['GOOGLE_CREDENTIALS'])
creds = Credentials.from_service_account_info(
    creds_json,
    scopes=[
        'https://spreadsheets.google.com/feeds',
        'https://www.googleapis.com/auth/drive'
    ]
)
gs = gspread.authorize(creds)
print("Authenticated successfully.")

# ── Pull ESPN Standings ───────────────────────────────────────────────────────
URL = "https://www.espn.com/nfl/standings"
df = pd.read_html(URL)
print(f"Tables pulled: {len(df)}")

df_afc = pd.concat([df[0], df[1]], axis=1)
df_nfc = pd.concat([df[2], df[3]], axis=1)
df_nfl = pd.concat([df_afc, df_nfc])
print(f"Standings shape: {df_nfl.shape}")

# ── Write to Google Sheet ─────────────────────────────────────────────────────
workbook  = gs.open("Copy  / AI  2025 NFL Pick Em")
worksheet = workbook.worksheet('Win Pct')

set_with_dataframe(
    worksheet, df_nfl,
    include_index=False,
    include_column_header=True,
    resize=False,
    row=54,
    col=2
)

print("Google Sheet updated successfully!")


name: NFL Standings Updater

on:
  schedule:
    # All times are UTC — adjust for your timezone
    # EST = UTC - 5  |  CST = UTC - 6  |  PST = UTC - 8
    - cron: '0 18 * * 0'    # Sunday 1pm EST
    - cron: '0 22 * * 0'    # Sunday 5pm EST
    - cron: '0 2  * * 1'    # Sunday 9pm EST (Monday UTC)
    - cron: '0 18 * * 1'    # Monday 1pm EST

  # Allows you to run manually from GitHub as well
  workflow_dispatch:

jobs:
  update_standings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas gspread gspread-dataframe google-auth lxml html5lib

      - name: Run standings update
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python nfl_standings.py
